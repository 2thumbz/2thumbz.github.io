<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선물 결과 화면</title>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        body { background-color: #f2f2f2; display: flex; justify-content: center; min-height: 100vh; color: #333; }

        /* 모바일 컨테이너 크기 제한 */
        .container { width: 100%; max-width: 450px; background-color: #fff; position: relative; padding-bottom: 80px; }

        /* 상단 닫기 버튼 영역 */
        .header { padding: 20px; text-align: right; background-color: #f2f2f2;}
        .close-btn { font-size: 24px; cursor: pointer; color: #000; text-decoration: none; }

        /* 상단 텍스트 및 이미지 카드 */
        .content { text-align: center; padding: 0 20px 40px; background-color: #f2f2f2; }
        .title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .subtitle { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 30px; }
        .subtitle strong { color: #333; }

        .product-card { background: #fff; width: fit-content; border-radius: 20px; margin-left: auto; margin-right: auto; padding: 20px 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; max-width: 200px; filter: grayscale(1); /* 이미지 흑백 처리 */ }

        .message-tag { background: #fff; border-radius: 50px; padding: 12px 20px; display: inline-flex; align-items: center; border: 1px solid #eee; font-size: 14px; }
        .message-tag img { width: 24px; height: 24px; border-radius: 50%; margin-right: 8px; }
        .message-tag .tag-text { color: #999; margin-right: 5px; }

        /* 받은 사람 리스트 영역 */
        .list-section { padding: 20px; background-color: #fff; }
        .list-header { font-size: 16px; margin-bottom: 20px; }
        .list-header span { color: #5c7cfa; font-weight: bold; }

        .list-item { display: flex; align-items: center; margin-bottom: 15px; }
        .rank { font-size: 18px; font-weight: bold; width: 30px; }
        .profile-img { width: 45px; height: 45px; border-radius: 18px; background-color: #eee; margin-right: 15px; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .user-info { font-size: 16px; font-weight: 500; }

        /* 하단 고정 버튼 */
        .footer-btn { position: fixed; bottom: 0; width: 100%; max-width: 450px; background-color: #fee500; border: none; padding: 20px; font-size: 18px; font-weight: bold; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="close-btn">✕</span>
    </div>

    <div class="content">
        <h1 class="title">하나도 안 아쉬워요!</h1>
        <p class="subtitle">데브섬즈/남/당겨옴 님에게<br><strong>세부 투어 상품권</strong> 선물을 받지 못했어요.</p>
        <div class="product-card">
            <img src="whaleshark.jpg" alt="cebu">
        </div>

        <div class="message-tag">
            <div class="profile-img" style="width:20px; height:20px; margin-right:5px; font-size: 10px;">👤</div>
            <span class="tag-text">메시지카드</span> "공짜를 좋아하면 대머리가 된다"
        </div>
    </div>

    <div class="list-section">
        <div class="list-header">못 받은 사람 <span>존나많음</span></div>
        
        <div class="list-item">
            <div class="rank">1</div>
            <div class="profile-img">🧘‍♀️</div>
            <div class="user-info">영히/여/부활절</div>
        </div>

        <div class="list-item">
            <div class="rank">2</div>
            <div class="profile-img">🍺</div>
            <div class="user-info">혜리개리/여/가겠지뭐</div>
        </div>

        <div class="list-item">
            <div class="rank">3</div>
            <div class="profile-img">🥖</div>
            <div class="user-info">바게트/남/보홀/2.28~3.2</div>
        </div>
		
		<div class="list-item">
            <div class="rank">4</div>
            <div class="profile-img">👴🏻</div>
            <div class="user-info">빈센조교/남/대한민국</div>
        </div>
		
		<div class="list-item">
            <div class="rank">5</div>
            <div class="profile-img">🏃🏻‍♂️</div>
            <div class="user-info">대진쥠/남/5월말파이트</div>
        </div>
    </div>

    <button class="footer-btn">나도 속아버리기</button>
</div>

</body>
</html>
